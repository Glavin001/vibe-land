name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  # ── Rust check & test ──────────────────────────────────────────────────────
  rust-check:
    name: Rust check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo fmt --all --check
      - run: cargo test

  # ── Client lint & unit tests ───────────────────────────────────────────────
  client-check:
    name: Client lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build WASM
        run: cd shared && wasm-pack build --target web --out-dir ../client/src/wasm/pkg

      - name: TypeScript check
        working-directory: client
        run: npx tsc --noEmit

      - name: Unit tests
        working-directory: client
        run: npm test

  # ── E2E tests (only after both check jobs pass) ────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [rust-check, client-check]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build WASM
        run: cd shared && wasm-pack build --target web --out-dir ../client/src/wasm/pkg

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build Rust server
        working-directory: server
        run: cargo build --release

      - name: Start Rust server in background
        run: |
          cd server && RUST_LOG=info cargo run --release &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:4001/healthz || (echo "Server failed to start" && exit 1)

      - name: Start Vite dev server in background
        working-directory: client
        run: |
          npx vite &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5555 > /dev/null 2>&1; then
              echo "Client ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests
        working-directory: client
        run: E2E_SKIP_WEB_SERVER=1 npx playwright test --config e2e/playwright.config.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-results
          path: client/e2e/test-results/
          retention-days: 14
