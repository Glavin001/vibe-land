name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:
  # ── Rust check & test ──────────────────────────────────────────────────────
  rust-check:
    name: Rust check & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check
      - run: cargo fmt --all --check
      - name: cargo test
        run: |
          cargo test --no-fail-fast 2>&1 | tee /tmp/cargo-test.log
          exit ${PIPESTATUS[0]}
      - name: Dump cargo test output on failure
        if: failure()
        run: |
          echo "::group::Full cargo test output"
          cat /tmp/cargo-test.log 2>/dev/null || echo "(no test log)"
          echo "::endgroup::"
          if [ -f /tmp/cargo-test.log ]; then
            FAILS=$(grep -E "FAIL|panicked|thread .* panicked|error\[|error:" /tmp/cargo-test.log | head -30)
            if [ -n "$FAILS" ]; then
              echo "::error::Cargo test failures:%0A${FAILS//$'\n'/%0A}"
            fi
          fi

  # ── Client lint & unit tests ───────────────────────────────────────────────
  client-check:
    name: Client lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build WASM
        run: cd shared && wasm-pack build --target web --out-dir ../client/src/wasm/pkg

      - name: Generate constants
        working-directory: client
        run: npm run gen:constants

      - name: Verify WASM output
        run: ls -la client/src/wasm/pkg/

      - name: TypeScript check
        working-directory: client
        run: |
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt
          exit ${PIPESTATUS[0]}

      - name: Unit tests
        working-directory: client
        run: |
          npx vitest run --reporter=verbose 2>&1 | tee /tmp/vitest-output.txt
          exit ${PIPESTATUS[0]}

      - name: Dump test output on failure
        if: failure()
        run: |
          echo "::group::TypeScript check output"
          cat /tmp/tsc-output.txt 2>/dev/null || echo "(no tsc output)"
          echo "::endgroup::"
          echo "::group::Vitest output"
          cat /tmp/vitest-output.txt 2>/dev/null || echo "(no vitest output)"
          echo "::endgroup::"
          # Also emit as error annotation for PR visibility
          if [ -f /tmp/vitest-output.txt ]; then
            FAILS=$(grep -E "FAIL|×|Error:|AssertionError" /tmp/vitest-output.txt | head -20)
            if [ -n "$FAILS" ]; then
              echo "::error::Vitest failures:%0A${FAILS//$'\n'/%0A}"
            fi
          fi

  # ── E2E tests (only after both check jobs pass) ────────────────────────────
  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [rust-check, client-check]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        working-directory: client
        run: npm ci

      - name: Build WASM
        run: cd shared && wasm-pack build --target web --out-dir ../client/src/wasm/pkg

      - name: Generate constants
        working-directory: client
        run: npm run gen:constants

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps chromium

      - name: Create .env from example
        run: cp .env.example .env

      - name: Build Rust server
        working-directory: server
        run: cargo build --release

      - name: Start Rust server in background
        run: |
          cd server && RUST_LOG=info cargo run --release &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:4001/healthz > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:4001/healthz || (echo "Server failed to start" && exit 1)

      - name: Start Vite dev server in background
        working-directory: client
        run: |
          npx vite &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5555 > /dev/null 2>&1; then
              echo "Client ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E tests
        working-directory: client
        run: E2E_SKIP_WEB_SERVER=1 npx playwright test --config e2e/playwright.config.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-results
          path: client/e2e/test-results/
          retention-days: 14
