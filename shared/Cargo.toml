[package]
name = "vibe-land-shared"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vibe-netcode = { path = "../netcode" }
bytes = "1"
nalgebra = "0.34"
rapier3d = { version = "0.30", default-features = false, features = ["dim3", "f32", "debug-render"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = []
simd-stable = ["rapier3d/simd-stable", "vibe-netcode/simd-stable"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"

# wasm-pack release profile — disable wasm-opt so the build doesn't require
# network access to download binaryen. The opt step is mostly a size win,
# not a speed win, and our builds run in environments without internet.
[package.metadata.wasm-pack.profile.release]
wasm-opt = false
