[package]
name = "vibe-land-shared"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vibe-netcode = { path = "../netcode" }
bytes = "1"
nalgebra = "0.34"
rapier3d = { version = "0.30", default-features = false, features = ["dim3", "f32", "debug-render"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
snap-machines-rapier = { git = "https://github.com/Glavin001/snap-machines", rev = "55ea2699bd0eaad8693e2d22987814e367df8511" }

[features]
default = []
simd-stable = ["rapier3d/simd-stable", "vibe-netcode/simd-stable"]

[package.metadata.wasm-pack.profile.dev]
wasm-opt = false

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
console_error_panic_hook = "0.1"
