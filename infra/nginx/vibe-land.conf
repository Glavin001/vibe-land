# nginx production config for self-hosted vibe-land.
#
# Layout:
#   * Static SPA from /var/www/vibe-land/client/dist  (built with `npm --prefix client run build`)
#   * /api/*                -> Node API server on 127.0.0.1:3000  (`npm run api:start`)
#   * /session-config, /ws, /healthz  -> Rust game server on 127.0.0.1:4001
#   * WebTransport on UDP :4002 is NOT proxied here — nginx can't proxy
#     QUIC/HTTP3. Expose :4002 directly on the firewall and point
#     WT_PUBLIC_URL at the same hostname.
#
# Swap YOUR_DOMAIN for the actual hostname and point the cert/key paths at
# the Let's Encrypt files (same pair can also be reused for WT_CERT_PEM /
# WT_KEY_PEM on the Rust server).

upstream vibe_land_api {
    server 127.0.0.1:3000;
    keepalive 16;
}

upstream vibe_land_game {
    server 127.0.0.1:4001;
    keepalive 16;
}

# HTTP -> HTTPS redirect. Keep /.well-known/acme-challenge/ writable for
# certbot renewals.
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # World uploads are up to 5 MB; screenshots up to 2 MB. Leave headroom
    # for multipart overhead. Keep this in sync with MAX_PUBLISH_BYTES in
    # api/_lib/storage.ts.
    client_max_body_size 8m;

    root /var/www/vibe-land/client/dist;
    index index.html;

    # Hashed assets from Vite are immutable — cache for a year.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # ─── API (long-running Node server mounting api/worlds/*) ───────────
    location /api/ {
        proxy_pass         http://vibe_land_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # ─── Rust game server: session config + health ──────────────────────
    location = /session-config {
        proxy_pass         http://vibe_land_game;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass         http://vibe_land_game;
        access_log off;
    }

    # ─── WebSocket upgrade for the TCP fallback transport ───────────────
    location /ws/ {
        proxy_pass         http://vibe_land_game;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ─── SPA fallback. HTML is revalidated on every request so a new
    #     deploy's hashed bundle is picked up immediately. ───────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
    }
}
